{% extends 'C:\Users\HP\Desktop\,\Speakup\home\templates\home\home_page.html' %}
{% load static %}
{% block form %}
<nav class="username_loc">
    <div class="">
      <ul id="nav-mobile">
          <li><a href="" style="color: purple">{{ request.user.username }}</a></li>
      </ul>
    </div>
</nav>
    <div class="section" style="height: 60px" id="users">
    <div class="row">
        <div class="col s3">
        <div class="card">
            <div class="collection">
                {% for user in users %}
                <a href="{% url 'chat' request.user.id user.id %}" id="user{{ user.id }}" class="collection-item_row">
                    <img src="{% static 'home/css/user.jpg' %}" class="col s4">
                    <div class="">
                    <span class="title" style="font-weight: bolder">{{ user.username }}</span>
                    </div>
                </a>
                {% endfor %}
            </div>
        </div>
        </div>
        <div class="">
            <div class="card">
            <div id="board" class="section grey lighten-3" style="height: 66vh">
                {% block messages %}

                {% endblock %}
            </div>
            <form id="chat-box" class="form-group {% block hide %}hide{% endblock %}" method="post">
                {% csrf_token %}
                <div class="row">
                    <div class="">
                        <div class="input-field">
                            <textarea id="id_message" name="message" type="text" placeholder="Type your message..." rows="6" cols="150"></textarea>
                        </div>
                    </div>
                    <div class="cols1" style="line-height: 80px">
                        <button type="submit" name="button" id="send_btn"></button>
                    </div>
                </div>
            </form>
            </div>
        </div>
    </div>
    </div>
    {% load static %}
    <script src="{% static 'chatroom/js/chat.js' %}"></script>
    <script>
        // For receiving
        sender_id = "{{ receiver.id }}";
        receiver_id = "{{ request.user.id }}";

        //For sending
        $(function () {
          scrolltoend();
          $('#chat-box').on('submit', function (event) {

            var message = ('#id_message');
            send('{{ request.user.username }}', '{{ receiver.username }}', message.val());
            message.val('');
        })
      })
    </script>
{% endblock %}
